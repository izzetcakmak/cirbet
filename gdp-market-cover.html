<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 900px; height: 420px; overflow: hidden; background: #0a0a0f; }
</style>
</head>
<body>
<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Cyan glow -->
    <radialGradient id="glowCyan" cx="35%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow right -->
    <radialGradient id="glowBlue" cx="85%" cy="30%" r="40%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Bar gradient dim -->
    <linearGradient id="barGradDim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#164e63"/>
      <stop offset="100%" stop-color="#0c3545"/>
    </linearGradient>
    <!-- Active bar gradient bright -->
    <linearGradient id="barGradActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="60%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="900" height="420" fill="url(#bgGrad)"/>
  <rect width="900" height="420" fill="url(#glowCyan)"/>
  <rect width="900" height="420" fill="url(#glowBlue)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="180" y1="0" x2="180" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="540" y1="0" x2="540" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/>
  </g>

  <!-- ─── LEFT SECTION: Labels ──────────────────────────────────────────── -->

  <!-- Category badge -->
  <rect x="44" y="44" width="120" height="26" rx="13" fill="#164e63" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="64" cy="57" r="4" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="76" y="62" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#22d3ee" letter-spacing="1">MACRO DATA</text>

  <!-- Main title -->
  <text x="44" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="800" fill="#f0f9ff" letter-spacing="-0.5">US GDP Growth</text>
  <text x="44" y="158" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="800" fill="#22d3ee" letter-spacing="-0.5">Q2 2026</text>

  <!-- Subtitle line -->
  <rect x="44" y="176" width="40" height="2" rx="1" fill="#06b6d4"/>
  <text x="44" y="210" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b">Bureau of Economic Analysis</text>
  <text x="44" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b">Release: July 30, 2026</text>

  <!-- Stats boxes -->
  <!-- Box 1 -->
  <rect x="44" y="264" width="110" height="60" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="54" y="284" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#475569" letter-spacing="1">PREV Q1</text>
  <text x="54" y="308" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#22d3ee">+1.6%</text>
  <!-- Box 2 -->
  <rect x="164" y="264" width="110" height="60" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="174" y="284" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#475569" letter-spacing="1">FORECAST</text>
  <text x="174" y="308" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#67e8f9">+2.1%</text>

  <!-- Source tag -->
  <text x="44" y="378" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#334155">SOURCE: BEA.GOV  ·  CIRBET.XYZ</text>

  <!-- Vertical divider -->
  <line x1="310" y1="30" x2="310" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- ─── RIGHT SECTION: Bar chart ──────────────────────────────────────── -->

  <!-- Chart label -->
  <text x="340" y="62" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#475569" letter-spacing="1.5">QUARTERLY GDP GROWTH (%)</text>

  <!-- Y-axis labels -->
  <text x="328" y="108" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#334155" text-anchor="end">4.0</text>
  <text x="328" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#334155" text-anchor="end">3.0</text>
  <text x="328" y="228" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#334155" text-anchor="end">2.0</text>
  <text x="328" y="288" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#334155" text-anchor="end">1.0</text>
  <text x="328" y="348" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#334155" text-anchor="end">0.0</text>

  <!-- Y gridlines -->
  <g stroke="#1e293b" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="336" y1="104" x2="880" y2="104"/>
    <line x1="336" y1="164" x2="880" y2="164"/>
    <line x1="336" y1="224" x2="880" y2="224"/>
    <line x1="336" y1="284" x2="880" y2="284"/>
    <line x1="336" y1="344" x2="880" y2="344"/>
  </g>

  <!-- Baseline -->
  <line x1="336" y1="344" x2="880" y2="344" stroke="#334155" stroke-width="1"/>

  <!-- Bars (Q3'25 to Q2'26) — baseline y=344, scale: 60px per 1% -->
  <!-- Q3 2025: 2.8% → height=168 → y=344-168=176 -->
  <rect x="356" y="176" width="60" height="168" rx="4" fill="url(#barGradDim)"/>
  <text x="386" y="367" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Q3 '25</text>
  <text x="386" y="170" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#0e7490" text-anchor="middle">2.8%</text>

  <!-- Q4 2025: 2.3% → height=138 → y=206 -->
  <rect x="446" y="206" width="60" height="138" rx="4" fill="url(#barGradDim)"/>
  <text x="476" y="367" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Q4 '25</text>
  <text x="476" y="200" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#0e7490" text-anchor="middle">2.3%</text>

  <!-- Q1 2026: 1.6% → height=96 → y=248 -->
  <rect x="536" y="248" width="60" height="96" rx="4" fill="url(#barGrad)"/>
  <text x="566" y="367" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">Q1 '26</text>
  <text x="566" y="242" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#22d3ee" text-anchor="middle">1.6%</text>

  <!-- Q2 2026: FORECAST ~2.1% → height=126 → y=218 — ACTIVE/QUESTION BAR -->
  <!-- Glow effect behind active bar -->
  <rect x="624" y="214" width="62" height="130" rx="6" fill="#06b6d4" opacity="0.15" filter="url(#softGlow)"/>
  <!-- Dashed border bar (forecast) -->
  <rect x="626" y="218" width="60" height="126" rx="4" fill="#0c3545" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Question mark overlay -->
  <text x="656" y="292" font-family="'Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="900" fill="#22d3ee" text-anchor="middle" opacity="0.5">?</text>
  <text x="656" y="367" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">Q2 '26</text>

  <!-- Forecast label badge on Q2 bar -->
  <rect x="623" y="194" width="68" height="20" rx="4" fill="#06b6d4" fill-opacity="0.2" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="657" y="208" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#67e8f9" text-anchor="middle" letter-spacing="0.5">FORECAST</text>

  <!-- Trend line over historical bars -->
  <polyline
    points="386,176 476,206 566,248"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="0"
    filter="url(#glow)"
  />
  <!-- Dotted continuation to forecast bar -->
  <line x1="566" y1="248" x2="656" y2="230" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Dots on trend line -->
  <circle cx="386" cy="176" r="4" fill="#0891b2" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="476" cy="206" r="4" fill="#0891b2" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="566" cy="248" r="4" fill="#22d3ee" stroke="#67e8f9" stroke-width="1.5"/>

  <!-- ── Range options strip at bottom right ───────────────────────────── -->
  <rect x="336" y="376" width="548" height="32" rx="0" fill="transparent"/>

  <!-- Option pills -->
  <rect x="340" y="378" width="88" height="24" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="384" y="394" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Below 1.0%</text>

  <rect x="436" y="378" width="96" height="24" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="484" y="394" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">1.0% – 2.0%</text>

  <rect x="540" y="378" width="96" height="24" rx="5" fill="#083344" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.6"/>
  <text x="588" y="394" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">2.0% – 3.0%</text>

  <rect x="644" y="378" width="88" height="24" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="688" y="394" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Above 3.0%</text>

  <!-- CirBet watermark -->
  <text x="856" y="394" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#1e293b" text-anchor="end" letter-spacing="1">CIRBET</text>

</svg>
</body>
</html>
